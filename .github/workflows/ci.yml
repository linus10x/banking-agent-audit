name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,test-property]"

      - name: Lint (ruff)
        run: ruff check src/ tests/ scripts/

      - name: Format check (ruff)
        run: ruff format --check src/ tests/ scripts/

      - name: Type check (mypy --strict)
        run: mypy --strict src/banking_agent_audit/ --ignore-missing-imports

      - name: Run tests with coverage
        run: |
          pytest tests/ -q \
            --cov=src/banking_agent_audit \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=90

      - name: AL-PROBES (adversarial primitive probes must pass)
        run: pytest tests/adversarial/ -q

      - name: Mutation pass (security predicates)
        run: python scripts/mutation_pass.py

      - name: Upload coverage report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        if: matrix.python-version == '3.12'
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 30
